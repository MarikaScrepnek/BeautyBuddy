version: "3.9"
services:
  backend:
    build: ./BeautyBuddy-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: always
    depends_on:
      - db

  frontend:
    build: ./BeautyBuddy-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    restart: always

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"