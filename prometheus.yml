global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'beautybuddy-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ["host.docker.internal:8082", "host.docker.internal:8081"]
  - job_name: "node"
    static_configs:
      - targets: ["host.docker.internal:9100"]