name: Parse Ingredients Job

on:
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest

    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_USER: ${{ secrets.VM_USER }}
      VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}

    steps:
      - name: Verify parse job prerequisites
        shell: bash
        run: |
          if [ -z "$VM_HOST" ]; then
            echo "Missing required repository secret: VM_HOST"
            exit 1
          fi

          if [ -z "$VM_USER" ]; then
            echo "Missing required repository secret: VM_USER"
            exit 1
          fi

          if [ -z "$VM_SSH_KEY" ]; then
            echo "Missing required repository secret: VM_SSH_KEY"
            exit 1
          fi

      - name: Run parse job on VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/BeautyBuddy
            if docker compose -p beautybuddy -f docker-compose.prod.yml ps -q backend_green >/dev/null && [ -n "$(docker compose -p beautybuddy -f docker-compose.prod.yml ps -q backend_green)" ]; then
              docker compose -p beautybuddy -f docker-compose.prod.yml exec -T backend_green java -jar /app/app.jar parse
            elif docker compose -p beautybuddy -f docker-compose.prod.yml ps -q backend_blue >/dev/null && [ -n "$(docker compose -p beautybuddy -f docker-compose.prod.yml ps -q backend_blue)" ]; then
              docker compose -p beautybuddy -f docker-compose.prod.yml exec -T backend_blue java -jar /app/app.jar parse
            else
              echo "No running backend container found (backend_green or backend_blue)."
              echo "Deploy first, then re-run parse job."
              exit 1
            fi