name: CI/CD Pipeline
on:
  push:
    branches: ["main"]
env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: marikascrepnek/beautybuddy-backend
  IMAGE_NAME_FRONTEND: marikascrepnek/beautybuddy-frontend
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build backend image
        run: |
          docker build \
            -t $REGISTRY/$IMAGE_NAME_BACKEND:${{ github.sha }} \
            ./BeautyBuddy-backend

      - name: Push backend image
        run: docker push $REGISTRY/$IMAGE_NAME_BACKEND:${{ github.sha }}

      - name: Build frontend image
        run: |
          docker build \
            -t $REGISTRY/$IMAGE_NAME_FRONTEND:${{ github.sha }} \
            ./BeautyBuddy-frontend

      - name: Push frontend image
        run: docker push $REGISTRY/$IMAGE_NAME_FRONTEND:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd ~/BeautyBuddy
            export TAG=${{ github.sha }}
            echo "Deploying version: $TAG"

            docker pull ghcr.io/marikascrepnek/beautybuddy-backend:$TAG
            docker pull ghcr.io/marikascrepnek/beautybuddy-frontend:$TAG

            # Determine which slot nginx is currently pointing at
            if sudo grep -q "server localhost:8081;" /etc/nginx/sites-enabled/beautybuddy; then
              ACTIVE=blue
              ACTIVE_PORT=8081
              INACTIVE=green
              INACTIVE_PORT=8082
            else
              ACTIVE=green
              ACTIVE_PORT=8082
              INACTIVE=blue
              INACTIVE_PORT=8081
            fi

            echo "Active: $ACTIVE ($ACTIVE_PORT) → deploying to: $INACTIVE ($INACTIVE_PORT)"

            # STEP 1: Deploy new image to the inactive slot
            TAG=$TAG docker compose -p beautybuddy -f docker-compose.prod.yml up -d backend_$INACTIVE

            # STEP 2: Wait for inactive slot to be healthy
            echo "Waiting for $INACTIVE to be healthy..."
            timeout 60 bash -c "until curl -fs http://localhost:$INACTIVE_PORT/actuator/health; do sleep 2; done"

            # STEP 3: Switch nginx to the new slot (targets upstream block specifically)
            echo "Switching traffic to $INACTIVE ($INACTIVE_PORT)"
            sudo sed -i "s/server localhost:$ACTIVE_PORT;/server localhost:$INACTIVE_PORT;/" /etc/nginx/sites-enabled/beautybuddy
            sudo nginx -t && sudo nginx -s reload

            # STEP 4: Stop the old active slot
            docker compose -p beautybuddy -f docker-compose.prod.yml stop backend_$ACTIVE

            echo "Deploy complete. Now serving from $INACTIVE on port $INACTIVE_PORT"

            docker compose -p beautybuddy -f docker-compose.prod.yml up -d frontend

            docker image prune -f