name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # ---- BACKEND ----
      - name: Build backend
        run: |
          docker build -t ghcr.io/marikascrepnek/beautybuddy-backend:latest ./BeautyBuddy-backend

      - name: Push backend
        run: |
          docker push ghcr.io/marikascrepnek/beautybuddy-backend:latest

      # ---- FRONTEND ----
      - name: Build frontend
        run: |
          docker build -t ghcr.io/marikascrepnek/beautybuddy-frontend:latest ./BeautyBuddy-frontend

      - name: Push frontend
        run: |
          docker push ghcr.io/marikascrepnek/beautybuddy-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/BeautyBuddy
            docker compose -p beautybuddy -f docker-compose.prod.yml pull
            docker compose -p beautybuddy -f docker-compose.prod.yml up -d --remove-orphans
            docker system prune -f